name: Bug report
description: 报告可复现的问题；请勿附带任何真实凭据或成绩数据
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        请勿粘贴账号、密码、手机令牌、Cookie、pku_token、SendKey、课程或成绩。即使诊断文件已经脱敏，也请在提交前人工检查。
  - type: input
    id: windows
    attributes:
      label: Windows 版本
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python 版本
      placeholder: 3.12.8
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请使用虚构或脱敏信息描述。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 只粘贴已经确认不含敏感信息的日志。
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 我已确认本报告不含账号、密码、令牌、Cookie、SendKey 或真实成绩数据。
          required: true
